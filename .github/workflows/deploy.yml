name: Notion → Dashboard 자동 배포

on:
  schedule:
    - cron: '0 * * * *'   # 매 정시 (1시간마다)
  workflow_dispatch:       # 수동 실행 버튼

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 노션 데이터 가져오기
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: python fetch_notion.py

      - name: 대시보드 HTML 생성
        run: python generate_dashboard.py

      - name: 나머지 정적 파일 복사
        run: |
          mkdir -p _site/assets
          cp index.html _site/
          cp data.json _site/
          # assets 폴더가 있으면 복사 (로고 등)
          if [ -d assets ]; then cp -r assets/. _site/assets/; fi
          # 다른 HTML 파일들도 복사
          for f in llm-wiki.html weekly-report.html 모빌리티_빅데이터팀_LLM-Wiki_가이드.html 모빌리티_빅데이터팀_주간리포트_가이드.html; do
            [ -f "$f" ] && cp "$f" _site/ || true
          done

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
